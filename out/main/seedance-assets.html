<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' data:; script-src 'self'; connect-src 'self' https:; img-src 'self' data: https: blob:; style-src 'self' 'unsafe-inline';" />
<title>Seedance 虚拟人像素材库</title>
<style>
  :root{
    --bg:#0f1117; --panel:#1a1d27; --panel-2:#22262f; --border:#2a2f3a;
    --fg:#e8e9ec; --fg-dim:#9aa1ad; --accent:#7c5cff; --accent-hover:#9579ff;
    --ok:#3ddc97; --warn:#ffb86b; --err:#ff6b6b;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--fg);font:13px/1.5 -apple-system,Segoe UI,PingFang SC,Microsoft YaHei,sans-serif;}
  .app{display:flex;flex-direction:column;height:100vh;}
  header{padding:10px 14px;border-bottom:1px solid var(--border);background:var(--panel);display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
  header h1{margin:0;font-size:14px;font-weight:600;}
  header .hint{color:var(--fg-dim);font-size:12px;}
  .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  input[type=text],input[type=password],input[type=search],select,textarea{
    background:var(--panel-2);color:var(--fg);border:1px solid var(--border);
    border-radius:6px;padding:6px 9px;font:inherit;outline:none;
  }
  input:focus,select:focus,textarea:focus{border-color:var(--accent);}
  textarea{resize:vertical;min-height:60px;width:100%;}
  button{background:var(--panel-2);color:var(--fg);border:1px solid var(--border);border-radius:6px;padding:6px 12px;cursor:pointer;font:inherit;}
  button:hover{background:#2c3140;border-color:#3a4050;}
  button.primary{background:var(--accent);border-color:var(--accent);color:#fff;}
  button.primary:hover{background:var(--accent-hover);border-color:var(--accent-hover);}
  button.danger{color:var(--err);border-color:#4a2a2a;}
  button.danger:hover{background:#3a1f1f;}
  button:disabled{opacity:0.5;cursor:not-allowed;}
  label{color:var(--fg-dim);font-size:12px;}
  main{flex:1;display:grid;grid-template-columns:340px 1fr;min-height:0;}
  .sidebar{border-right:1px solid var(--border);padding:14px;overflow:auto;background:var(--panel);}
  .sidebar h2{font-size:13px;margin:0 0 8px;color:var(--fg-dim);font-weight:600;text-transform:uppercase;letter-spacing:.5px;}
  .sidebar fieldset{border:1px solid var(--border);border-radius:8px;padding:10px;margin:0 0 12px;}
  .sidebar legend{padding:0 6px;color:var(--fg-dim);font-size:12px;}
  .sidebar .field{margin-bottom:8px;}
  .sidebar .field label{display:block;margin-bottom:3px;}
  .sidebar .field input,.sidebar .field select,.sidebar .field textarea{width:100%;}
  .sidebar .actions{display:flex;gap:6px;flex-wrap:wrap;}
  .content{padding:14px;overflow:auto;}
  .toolbar{display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap;}
  .toolbar .spacer{flex:1;}
  table{width:100%;border-collapse:collapse;font-size:12.5px;}
  th,td{padding:8px 10px;text-align:left;border-bottom:1px solid var(--border);vertical-align:middle;}
  th{color:var(--fg-dim);font-weight:600;font-size:11.5px;text-transform:uppercase;letter-spacing:.3px;background:var(--panel);position:sticky;top:0;z-index:1;}
  tr:hover td{background:#181b23;}
  td.thumb{width:64px;}
  td.thumb img{width:48px;height:48px;border-radius:4px;object-fit:cover;background:#222;}
  td.thumb .ph{width:48px;height:48px;border-radius:4px;background:#222;display:flex;align-items:center;justify-content:center;color:var(--fg-dim);font-size:10px;}
  .asset-id{font-family:Consolas,Menlo,monospace;font-size:11.5px;color:var(--fg-dim);}
  .status{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;}
  .st-active{background:rgba(61,220,151,.15);color:var(--ok);}
  .st-processing{background:rgba(255,184,107,.15);color:var(--warn);}
  .st-failed,.st-deleted,.st-deleting{background:rgba(255,107,107,.15);color:var(--err);}
  .actions-cell{white-space:nowrap;}
  .actions-cell button{padding:3px 8px;font-size:11.5px;margin-right:4px;}
  .empty{padding:40px;text-align:center;color:var(--fg-dim);}
  .pagination{padding:10px;display:flex;justify-content:center;gap:6px;align-items:center;color:var(--fg-dim);font-size:12px;}
  .toast{position:fixed;bottom:18px;right:18px;background:var(--panel-2);border:1px solid var(--border);padding:9px 14px;border-radius:8px;color:var(--fg);box-shadow:0 4px 20px rgba(0,0,0,.4);font-size:12.5px;opacity:0;transition:opacity .2s;pointer-events:none;}
  .toast.show{opacity:1;}
  .toast.err{border-color:#4a2a2a;color:var(--err);}
  .toast.ok{border-color:#2a4a3a;color:var(--ok);}
  .seg{display:inline-flex;border:1px solid var(--border);border-radius:6px;overflow:hidden;}
  .seg button{border:0;border-radius:0;background:transparent;padding:5px 12px;}
  .seg button.active{background:var(--accent);color:#fff;}
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>Seedance 虚拟人像素材库</h1>
    <span class="hint">仅用于 <code>seedance-2-0-pro</code> · 素材入库后用 <code>asset://&lt;asset_id&gt;</code> 引用</span>
  </header>

  <main>
    <aside class="sidebar">
      <fieldset>
        <legend>连接配置</legend>
        <div class="field">
          <label>Base URL</label>
          <input type="text" id="cfg-baseUrl" placeholder="https://sd2.mengfactory.cn" />
        </div>
        <div class="field">
          <label>API Key</label>
          <input type="password" id="cfg-apiKey" placeholder="sk-..." autocomplete="off" />
        </div>
        <div class="actions">
          <button id="btn-save-cfg">保存配置</button>
          <button id="btn-toggle-key" title="显示/隐藏 Key">👁</button>
        </div>
      </fieldset>

      <fieldset>
        <legend>打开素材库的快捷键</legend>
        <div class="field">
          <label>快捷键组合</label>
          <div class="row">
            <input type="text" id="sc-input" placeholder="CommandOrControl+Shift+A" style="flex:1;" />
            <button id="btn-sc-record" title="点击后按下你想要的键位组合">🎙 录制</button>
          </div>
          <div class="hint-sm" id="sc-status" style="margin-top:6px;color:var(--fg-dim);font-size:11.5px;">当前快捷键: <span id="sc-current">—</span></div>
        </div>
        <div class="actions">
          <button class="primary" id="btn-sc-save">保存并应用</button>
          <button id="btn-sc-reset">恢复默认</button>
        </div>
        <div class="hint-sm" style="margin-top:8px;color:var(--fg-dim);font-size:11px;line-height:1.5;">
          支持修饰键 <code>Ctrl</code>/<code>Shift</code>/<code>Alt</code> 配主键（如 <code>A-Z</code>、<code>0-9</code>、<code>F1-F12</code>），<br/>
          也可手动输入 Electron 加速器格式，例如 <code>CommandOrControl+Alt+L</code>。
        </div>
      </fieldset>

      <fieldset>
        <legend>新建素材</legend>
        <div class="row" style="margin-bottom:8px;">
          <div class="seg">
            <button id="mode-url" class="active" data-mode="url">远程 URL</button>
            <button id="mode-file" data-mode="file">本地文件</button>
          </div>
        </div>
        <div class="field" id="new-url-field">
          <label>图片 URL</label>
          <input type="text" id="new-url" placeholder="https://cdn.example.com/avatar.png" />
        </div>
        <div class="field" id="new-file-field" style="display:none;">
          <label>本地文件</label>
          <div class="row">
            <input type="text" id="new-file-path" placeholder="未选择" readonly style="flex:1;" />
            <button id="btn-pick-file">选择…</button>
          </div>
        </div>
        <div class="field">
          <label>素材类型</label>
          <select id="new-asset-type">
            <option value="Image" selected>Image（图片）</option>
          </select>
        </div>
        <div class="field">
          <label>名称（可选）</label>
          <input type="text" id="new-name" placeholder="virtual-avatar-front" />
        </div>
        <div class="field">
          <label>描述（可选）</label>
          <textarea id="new-desc" placeholder="正面虚拟人像"></textarea>
        </div>
        <div class="actions">
          <button class="primary" id="btn-create">提交入库</button>
        </div>
      </fieldset>
    </aside>

    <section class="content">
      <div class="toolbar">
        <input type="search" id="filter-search" placeholder="搜索素材名…" style="width:180px;" />
        <select id="filter-status">
          <option value="">所有状态</option>
          <option value="active">active</option>
          <option value="processing">processing</option>
          <option value="failed">failed</option>
          <option value="deleting">deleting</option>
          <option value="deleted">deleted</option>
        </select>
        <select id="filter-type">
          <option value="">所有类型</option>
          <option value="Image">Image</option>
        </select>
        <select id="filter-sort">
          <option value="created_at">按创建时间</option>
          <option value="updated_at">按更新时间</option>
          <option value="last_used_at">按最近使用</option>
          <option value="name">按名称</option>
        </select>
        <select id="filter-order">
          <option value="desc">降序</option>
          <option value="asc">升序</option>
        </select>
        <span class="spacer"></span>
        <button id="btn-refresh">🔄 刷新列表</button>
      </div>

      <div style="overflow:auto;border:1px solid var(--border);border-radius:8px;background:var(--panel);">
        <table>
          <thead>
            <tr>
              <th>预览</th>
              <th>asset_id / 名称</th>
              <th>类型</th>
              <th>状态</th>
              <th>创建时间</th>
              <th style="text-align:right;">操作</th>
            </tr>
          </thead>
          <tbody id="asset-list">
            <tr><td colspan="6" class="empty">点击右上角 🔄 刷新列表</td></tr>
          </tbody>
        </table>
      </div>

      <div class="pagination">
        <button id="page-prev">‹ 上一页</button>
        <span id="page-info">第 1 页</span>
        <button id="page-next">下一页 ›</button>
        <select id="page-size" style="margin-left:10px;">
          <option value="20" selected>20/页</option>
          <option value="50">50/页</option>
          <option value="100">100/页</option>
        </select>
      </div>
    </section>
  </main>
</div>

<div id="toast" class="toast"></div>

<script>
(() => {
  const $ = (id) => document.getElementById(id);
  const toast = (msg, kind="") => {
    const t = $("toast");
    t.textContent = msg;
    t.className = "toast show " + kind;
    clearTimeout(toast._t);
    toast._t = setTimeout(() => t.classList.remove("show"), 2400);
  };

  // ---- config (localStorage) ----
  const cfg = {
    get: () => ({
      baseUrl: localStorage.getItem("sd_baseUrl") || "https://sd2.mengfactory.cn",
      apiKey:  localStorage.getItem("sd_apiKey")  || "",
    }),
    save: (b, k) => {
      localStorage.setItem("sd_baseUrl", b.trim().replace(/\/+$/,""));
      localStorage.setItem("sd_apiKey",  k.trim());
    },
  };
  const c0 = cfg.get();
  $("cfg-baseUrl").value = c0.baseUrl;
  $("cfg-apiKey").value  = c0.apiKey;

  $("btn-save-cfg").onclick = () => {
    cfg.save($("cfg-baseUrl").value, $("cfg-apiKey").value);
    toast("配置已保存", "ok");
  };
  $("btn-toggle-key").onclick = () => {
    const i = $("cfg-apiKey");
    i.type = i.type === "password" ? "text" : "password";
  };

  // ---- shortcut config ----
  const DOM_TO_ACCEL = {
    "Escape":"Escape","Tab":"Tab","Enter":"Return","Backspace":"Backspace","Delete":"Delete","Insert":"Insert",
    "Home":"Home","End":"End","PageUp":"PageUp","PageDown":"PageDown",
    "ArrowUp":"Up","ArrowDown":"Down","ArrowLeft":"Left","ArrowRight":"Right",
    " ":"Space",
  };
  function domEventToAccelerator(e) {
    const parts = [];
    if (e.ctrlKey || e.metaKey) parts.push("CommandOrControl");
    if (e.altKey)   parts.push("Alt");
    if (e.shiftKey) parts.push("Shift");
    let k = e.key;
    if (["Control","Shift","Alt","Meta","CapsLock","ContextMenu"].includes(k)) return null;
    if (DOM_TO_ACCEL[k]) k = DOM_TO_ACCEL[k];
    else if (/^F([1-9]|1[0-9]|2[0-4])$/.test(k)) { /* keep */ }
    else if (k.length === 1) k = k.toUpperCase();
    else return null;
    parts.push(k);
    if (parts.length < 2) return null;
    return parts.join("+");
  }
  async function refreshShortcutDisplay() {
    try {
      const r = await window.seedanceAssets.shortcut.get();
      if (r && r.ok) {
        const cur = r.active || r.accelerator || "(未注册)";
        $("sc-current").textContent = cur;
        if (!$("sc-input").value) $("sc-input").value = cur;
      }
    } catch {}
  }
  let _scRecording = false;
  function setRecording(on) {
    _scRecording = on;
    const btn = $("btn-sc-record");
    btn.textContent = on ? "● 按下键位…" : "🎙 录制";
    btn.style.background = on ? "var(--accent)" : "";
    btn.style.color      = on ? "#fff" : "";
    $("sc-input").placeholder = on ? "请按下组合键…" : "CommandOrControl+Shift+A";
  }
  $("btn-sc-record").onclick = () => setRecording(!_scRecording);
  $("sc-input").addEventListener("keydown", (e) => {
    if (!_scRecording) return;
    e.preventDefault(); e.stopPropagation();
    const accel = domEventToAccelerator(e);
    if (accel) {
      $("sc-input").value = accel;
      setRecording(false);
    }
  });
  // 也允许在整个窗口范围内捕获（用户点了录制就开始监听）
  window.addEventListener("keydown", (e) => {
    if (!_scRecording) return;
    if (e.target.tagName === "INPUT" && e.target.id === "sc-input") return; // already handled
    e.preventDefault(); e.stopPropagation();
    const accel = domEventToAccelerator(e);
    if (accel) {
      $("sc-input").value = accel;
      setRecording(false);
    }
  }, true);
  $("btn-sc-save").onclick = async () => {
    const accel = $("sc-input").value.trim();
    if (!accel) { toast("请先输入或录制快捷键", "err"); return; }
    const btn = $("btn-sc-save"); btn.disabled = true; btn.textContent = "保存中…";
    try {
      const r = await window.seedanceAssets.shortcut.set(accel);
      if (!r.ok) throw new Error(r.error || "注册失败");
      toast(`快捷键已更新为 ${r.accelerator}`, "ok");
      await refreshShortcutDisplay();
    } catch (e) {
      toast(e.message || String(e), "err");
    } finally {
      btn.disabled = false; btn.textContent = "保存并应用";
    }
  };
  $("btn-sc-reset").onclick = async () => {
    const btn = $("btn-sc-reset"); btn.disabled = true;
    try {
      const r = await window.seedanceAssets.shortcut.reset();
      if (!r.ok) throw new Error(r.error || "重置失败");
      toast(`已恢复默认 ${r.accelerator}`, "ok");
      $("sc-input").value = r.accelerator || "";
      await refreshShortcutDisplay();
    } catch (e) {
      toast(e.message || String(e), "err");
    } finally {
      btn.disabled = false;
    }
  };
  refreshShortcutDisplay();

  // ---- new asset mode toggle ----
  let mode = "url";
  $("mode-url").onclick = () => { mode = "url"; $("mode-url").classList.add("active"); $("mode-file").classList.remove("active"); $("new-url-field").style.display=""; $("new-file-field").style.display="none"; };
  $("mode-file").onclick = () => { mode = "file"; $("mode-file").classList.add("active"); $("mode-url").classList.remove("active"); $("new-url-field").style.display="none"; $("new-file-field").style.display=""; };

  $("btn-pick-file").onclick = async () => {
    const p = await window.seedanceAssets.pickFile();
    if (p) $("new-file-path").value = p;
  };

  $("btn-create").onclick = async () => {
    const c = cfg.get();
    if (!c.apiKey) { toast("请先填 API Key", "err"); return; }
    const btn = $("btn-create"); btn.disabled = true; btn.textContent = "提交中…";
    try {
      const params = {
        baseUrl: c.baseUrl,
        apiKey: c.apiKey,
        mode,
        url: $("new-url").value.trim(),
        filePath: $("new-file-path").value.trim(),
        asset_type: $("new-asset-type").value,
        name: $("new-name").value.trim(),
        description: $("new-desc").value.trim(),
      };
      if (mode === "url" && !params.url) throw new Error("请填图片 URL");
      if (mode === "file" && !params.filePath) throw new Error("请选择本地文件");
      const r = await window.seedanceAssets.create(params);
      if (!r.ok) throw new Error(r.error || "提交失败");
      toast(`入库成功：${r.data?.asset?.asset_id || ""}`, "ok");
      $("new-url").value=""; $("new-file-path").value=""; $("new-name").value=""; $("new-desc").value="";
      await loadList();
    } catch (e) {
      toast(e.message || String(e), "err");
    } finally {
      btn.disabled = false; btn.textContent = "提交入库";
    }
  };

  // ---- list ----
  let page = 1, pageSize = 20, totalPages = 1;

  function fmtTime(ts) {
    if (!ts) return "—";
    const d = new Date(ts * 1000);
    if (isNaN(d.getTime())) return "—";
    const pad = n => String(n).padStart(2,"0");
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
  }

  function statusBadge(s) {
    const cls = `st-${s||"unknown"}`;
    return `<span class="status ${cls}">${s||"unknown"}</span>`;
  }

  function rowHTML(a) {
    const assetUri = `asset://${a.asset_id}`;
    const preview = a.url
      ? `<img src="${escapeHtml(a.url)}" alt="" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'ph',textContent:'×'}))" />`
      : `<div class="ph">—</div>`;
    return `<tr data-id="${escapeHtml(a.asset_id)}">
      <td class="thumb">${preview}</td>
      <td>
        <div><strong>${escapeHtml(a.name||"(未命名)")}</strong></div>
        <div class="asset-id" title="${escapeHtml(a.asset_id)}">${escapeHtml(a.asset_id)}</div>
        ${a.last_error ? `<div style="color:var(--err);font-size:11px;margin-top:2px;">错误: ${escapeHtml(a.last_error)}</div>` : ""}
      </td>
      <td>${escapeHtml(a.asset_type||"—")}</td>
      <td>${statusBadge(a.status)}</td>
      <td>${fmtTime(a.created_at)}</td>
      <td class="actions-cell">
        <button data-act="copy" title="复制 asset:// 引用">📋 复制</button>
        <button data-act="refresh" title="刷新状态">🔄</button>
        <button data-act="delete" class="danger" title="删除素材">删除</button>
      </td>
    </tr>`;
  }

  function escapeHtml(s) {
    return String(s||"").replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
  }

  async function loadList() {
    const c = cfg.get();
    if (!c.apiKey) { toast("请先填 API Key", "err"); return; }
    const tbody = $("asset-list");
    tbody.innerHTML = `<tr><td colspan="6" class="empty">加载中…</td></tr>`;
    try {
      const params = {
        baseUrl: c.baseUrl,
        apiKey: c.apiKey,
        asset_type: $("filter-type").value || undefined,
        status: $("filter-status").value || undefined,
        search: $("filter-search").value.trim() || undefined,
        sort_by: $("filter-sort").value,
        sort_order: $("filter-order").value,
        page,
        page_size: pageSize,
      };
      const r = await window.seedanceAssets.list(params);
      if (!r.ok) throw new Error(r.error || "查询失败");
      const assets = r.data?.assets || [];
      const total = r.data?.pagination?.total ?? assets.length;
      totalPages = Math.max(1, Math.ceil(total / pageSize));
      if (!assets.length) {
        tbody.innerHTML = `<tr><td colspan="6" class="empty">暂无素材</td></tr>`;
      } else {
        tbody.innerHTML = assets.map(rowHTML).join("");
      }
      $("page-info").textContent = `第 ${page} / ${totalPages} 页 · 共 ${total} 条`;
    } catch (e) {
      tbody.innerHTML = `<tr><td colspan="6" class="empty" style="color:var(--err)">${escapeHtml(e.message)}</td></tr>`;
    }
  }

  $("btn-refresh").onclick = () => { page = 1; loadList(); };
  $("page-prev").onclick = () => { if (page > 1) { page--; loadList(); } };
  $("page-next").onclick = () => { if (page < totalPages) { page++; loadList(); } };
  $("page-size").onchange = (e) => { pageSize = parseInt(e.target.value,10) || 20; page = 1; loadList(); };
  ["filter-search","filter-status","filter-type","filter-sort","filter-order"].forEach(id => {
    $(id).addEventListener("change", () => { page = 1; loadList(); });
  });
  $("filter-search").addEventListener("keydown", e => { if (e.key === "Enter") { page = 1; loadList(); } });

  // delegate row actions
  $("asset-list").addEventListener("click", async (e) => {
    const btn = e.target.closest("button[data-act]");
    if (!btn) return;
    const tr = btn.closest("tr");
    const id = tr.getAttribute("data-id");
    const act = btn.getAttribute("data-act");
    const c = cfg.get();
    if (!c.apiKey) { toast("请先填 API Key", "err"); return; }
    if (act === "copy") {
      const r = await window.seedanceAssets.copyText(`asset://${id}`);
      toast(r.ok ? `已复制 asset://${id.slice(0,12)}…` : "复制失败", r.ok ? "ok" : "err");
    } else if (act === "refresh") {
      btn.disabled = true;
      try {
        const r = await window.seedanceAssets.get({ baseUrl: c.baseUrl, apiKey: c.apiKey, asset_id: id, refresh: true });
        if (!r.ok) throw new Error(r.error || "刷新失败");
        toast("状态已刷新", "ok");
        await loadList();
      } catch (err) { toast(err.message, "err"); }
      finally { btn.disabled = false; }
    } else if (act === "delete") {
      if (!confirm(`确认删除 ${id}？删除后不可作为新任务的 asset:// 引用。`)) return;
      btn.disabled = true;
      try {
        const r = await window.seedanceAssets.delete({ baseUrl: c.baseUrl, apiKey: c.apiKey, asset_id: id });
        if (!r.ok) throw new Error(r.error || "删除失败");
        toast("已删除", "ok");
        await loadList();
      } catch (err) { toast(err.message, "err"); }
      finally { btn.disabled = false; }
    }
  });

  // Auto-load on first open if key present
  if (cfg.get().apiKey) {
    setTimeout(loadList, 200);
  }
})();
</script>
</body>
</html>
